services:
  loga3:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: loga3:local
    ports:
      - "${LOGA3_GUI_PORT:-3847}:3847"
    environment:
      LOGA3_GUI_HOST: "0.0.0.0"
      LOGA3_GUI_PORT: "3847"
      LOGA3_HEADLESS: "${LOGA3_HEADLESS:-1}"
      LOGA3_DOWNLOADS_DIR: /app/downloads
      LOGA3_LOGS_DIR: /app/logs
      # Optional: still works. Prefer URL + login in the web UI (stored in volume).
      LOGA3_BASE_URL: "${LOGA3_BASE_URL:-}"
      LOGA3_USERNAME: "${LOGA3_USERNAME:-}"
      LOGA3_PASSWORD: "${LOGA3_PASSWORD:-}"
    volumes:
      - ../downloads:/app/downloads
      - ../logs:/app/logs
      - ../data:/app/data
    restart: unless-stopped
